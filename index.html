<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Agent | Sudur Pickles</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob"></div>
        <div class="blob"></div>
    </div>

    <div class="container">
        <h1>Voice Assistant</h1>
        <p class="status-text" id="status">Ready to help</p>
        
        <div class="orb-container" id="orb-trigger">
            <div class="pulse-ring"></div>
            <div class="pulse-ring"></div>
            <div class="pulse-ring"></div>
            <div class="orb" id="orb">
                <div class="orb-inner"></div>
            </div>
        </div>

        <div class="controls">
            <button id="start-btn">Push to Talk</button>
            <button id="auto-btn">Auto-Listen (Off)</button>
        </div>

        <p class="transcript" id="transcript">Click the orb to start...</p>
    </div>

    <script src="app.js"></script>
</body>
</html>
